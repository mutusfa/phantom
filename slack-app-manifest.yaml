# Slack App Manifest for Phantom
#
# Use this to create your Slack app in 30 seconds:
#   1. Go to https://api.slack.com/apps
#   2. Click "Create New App" > "From an app manifest"
#   3. Select your workspace
#   4. Paste this entire file (switch to YAML tab)
#   5. Click "Create"
#   6. Click "Install to Workspace"
#
# After install:
#   - Copy the Bot Token (xoxb-) from OAuth & Permissions
#   - Create an App-Level Token with connections:write scope
#     under Basic Information > App-Level Tokens
#   - Copy the App Token (xapp-)

display_information:
  name: Phantom
  description: Your AI co-worker
  background_color: "#22D3EE"

features:
  bot_user:
    display_name: Phantom
    always_online: true
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.public
      - groups:history
      - im:history
      - im:read
      - im:write
      - reactions:read
      - reactions:write
      - users:read
      - team:read
      - users.profile:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - reaction_added
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
